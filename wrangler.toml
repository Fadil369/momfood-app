name = "momfood-app"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# ─── D1 binding (ZuZu Platform — Phase 0) ───────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "momfood-zuzu"
database_id = "ae43cf60-5517-44b0-9373-299ff1e68167"
migrations_dir = "migrations"

# ─── R2 bucket (verification docs + dish photos) ────────────────────────────
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "momfood-uploads"

# ─── Vars (non-secret) ──────────────────────────────────────────────────────
[vars]
NODE_VERSION = "20"

# ─── Production environment overrides ───────────────────────────────────────
[env.production]

[[env.production.d1_databases]]
binding = "DB"
database_name = "momfood-zuzu"
database_id = "ae43cf60-5517-44b0-9373-299ff1e68167"

[[env.production.r2_buckets]]
binding = "UPLOADS"
bucket_name = "momfood-uploads"

# ─── Secrets (set via wrangler pages secret put <KEY> --project-name momfood-app)
#   ELEVENLABS_API_KEY     ✅ configured
#   DEEPSEEK_API_KEY       ⏳ TODO (reuse from hnh-unified)
#   JWT_SIGNING_KEY        ⏳ TODO (openssl rand -hex 64)
#   GRAVATAR_API_KEY       ⏳ TODO (register app "ZuZu" first)
